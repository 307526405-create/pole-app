<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  
  <g opacity="0.12">
    <rect x="0" y="0" width="128" height="128" fill="#fff"/>
    <rect x="256" y="0" width="128" height="128" fill="#fff"/>
    <rect x="512" y="0" width="128" height="128" fill="#fff"/>
    <rect x="768" y="0" width="128" height="128" fill="#fff"/>
    <rect x="128" y="128" width="128" height="128" fill="#fff"/>
    <rect x="384" y="128" width="128" height="128" fill="#fff"/>
    <rect x="640" y="128" width="128" height="128" fill="#fff"/>
    <rect x="896" y="128" width="128" height="128" fill="#fff"/>
    <rect x="0" y="256" width="128" height="128" fill="#fff"/>
    <rect x="256" y="256" width="128" height="128" fill="#fff"/>
    <rect x="512" y="256" width="128" height="128" fill="#fff"/>
    <rect x="768" y="256" width="128" height="128" fill="#fff"/>
    <rect x="128" y="384" width="128" height="128" fill="#fff"/>
    <rect x="384" y="384" width="128" height="128" fill="#fff"/>
    <rect x="640" y="384" width="128" height="128" fill="#fff"/>
    <rect x="896" y="384" width="128" height="128" fill="#fff"/>
  </g>
  
  <!-- 杆位 双字设计 -->
  <text x="480" y="520" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, PingFang SC, sans-serif" font-size="380" font-weight="900" fill="#E10600" letter-spacing="-8" opacity="0.95">杆位</text>
  
  <!-- 微弱光晕 -->
  <text x="480" y="520" text-anchor="middle" dominant-baseline="middle" font-family="-apple-system, PingFang SC, sans-serif" font-size="380" font-weight="900" fill="none" stroke="#E10600" stroke-width="2" opacity="0.15" letter-spacing="-8"/>
</svg>
